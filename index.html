<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中考历史复习通 — 中国全史交互式学习</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入字体图标或外部资源可以增加美感，但按要求使用纯技术 -->
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">📖 历史复习通</div>
            <p class="subtitle">涵盖初一至初三核心考点（古代史·近代史·现代史）</p>
        </header>

        <nav class="period-nav">
            <button class="nav-item active" onclick="switchPeriod('ancient')">🏛️ 古代史</button>
            <button class="nav-item" onclick="switchPeriod('modern')">⚔️ 近代史</button>
            <button class="nav-item" onclick="switchPeriod('contemporary')">🚀 现代史</button>
            <button class="nav-item challenge-nav" onclick="startMegaChallenge()">🏆 终极考场</button>
        </nav>

        <main class="container">
            <aside class="sidebar">
                <div class="sidebar-title">章节导航</div>
                <div id="chapter-list" class="chapter-list">
                    <!-- 由 JS 动态生成 -->
                </div>
            </aside>

            <section class="content-view">
                <div id="empty-state" class="empty-state">
                    <div class="empty-icon">📂</div>
                    <h3>请选择左侧章节开始复习</h3>
                    <p>逻辑串联 · 课本同步 · 趣味闯关</p>
                </div>

                <div id="main-content" class="main-content" style="display:none;">
                    <div class="content-header">
                        <h2 id="view-title">章节标题</h2>
                        <div class="content-meta">
                            <span id="view-time" class="badge">时间范围</span>
                            <span id="view-importance" class="badge importance">重要程度：⭐⭐⭐</span>
                        </div>
                    </div>

                    <div class="image-box">
                        <img id="view-image" src="" alt="历史图片">
                        <div id="image-caption" class="image-caption">图片描述</div>
                    </div>

                    <div class="knowledge-section">
                        <h3>核心考点归纳</h3>
                        <ul id="view-points" class="point-list">
                            <!-- 动态填充 -->
                        </ul>
                    </div>

                    <div class="logic-link">
                        <h3>💡 逻辑串联</h3>
                        <p id="view-logic">该章节在历史长河中的地位与前后联系。</p>
                    </div>

                    <div class="action-bar">
                        <button class="btn btn-audio" onclick="readCurrentContent()">🔊 听讲解</button>
                        <button class="btn btn-game" onclick="playChapterGame()">🎮 知识闯关</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="main-footer">
            <p>基于部编版初中历史教材整理 · 助力中考复习</p>
        </footer>

        <!-- 全局弹窗：小游戏 -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h3 id="modal-title">闯关挑战</h3>
                    <button class="close-btn" onclick="closeModal()">×</button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- 游戏内容动态注入 -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
